version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: imp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - imp-network

  redis:
    image: redis:7-alpine
    container_name: imp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - imp-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: imp-kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
    ports:
      - "9094:9094"
    networks:
      - imp-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: imp-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # HTTP UI
    networks:
      - imp-network

  gateway-service:
    build:
      context: ../
      dockerfile: gateway-service/Dockerfile
    container_name: imp-gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - auth-service
      - incident-service
      - reporting-service
    networks:
      - imp-network

  auth-service:
    build:
      context: ../
      dockerfile: auth-service/Dockerfile
    container_name: imp-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=adminpassword
    depends_on:
      - postgres
    networks:
      - imp-network

  incident-service:
    build:
      context: ../
      dockerfile: incident-service/Dockerfile
    container_name: imp-incident-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=incident_db
      - DB_USER=postgres
      - DB_PASSWORD=adminpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - imp-network

  notification-service:
    build:
      context: ../
      dockerfile: notification-service/Dockerfile
    container_name: imp-notification-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
    depends_on:
      - kafka
      - mailhog
    networks:
      - imp-network

  reporting-service:
    build:
      context: ../
      dockerfile: reporting-service/Dockerfile
    container_name: imp-reporting-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reporting_db
      - DB_USER=postgres
      - DB_PASSWORD=adminpassword
    depends_on:
      - postgres
    networks:
      - imp-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: imp-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway-service
    networks:
      - imp-network

networks:
  imp-network:
    name: imp-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
