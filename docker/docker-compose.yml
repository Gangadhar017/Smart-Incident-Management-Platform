version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: imp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - imp-network

  redis:
    image: redis:7-alpine
    container_name: imp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - imp-network

  kafka:
    image: bitnami/kafka:3.5.1
    container_name: imp-kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - imp-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: imp-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # HTTP UI
    networks:
      - imp-network

  gateway-service:
    build:
      context: ../gateway-service
      dockerfile: Dockerfile
    container_name: imp-gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - auth-service
      - incident-service
      - reporting-service
    networks:
      - imp-network

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    container_name: imp-auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
