server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/departments/**, /api/v1/teams/**
        - id: incident-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/incidents/**, /api/v1/comments/**, /api/v1/attachments/**, /api/v1/sla-rules/**
        - id: reporting-service
          uri: http://localhost:8083
          predicates:
